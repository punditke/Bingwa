name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: '33.0.1'
        target: 'android-33'
    
    - name: Set JAVA_HOME
      run: echo "JAVA_HOME=${{ env.JAVA_HOME }}" >> $GITHUB_ENV
      
    - name: Verify Java Installation
      run: |
        echo "JAVA_HOME: $JAVA_HOME"
        java -version
        which java
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Create local properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "kotlin.code.style=official" >> gradle.properties
        echo "android.nonTransitiveRClass=true" >> gradle.properties
    
    - name: Build Debug APK
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleDebug --no-daemon --stacktrace --info
    
    - name: Build Release APK
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}
      run: ./gradlew assembleRelease --no-daemon --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
        
    - name: Upload Build Reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-reports
        path: |
          app/build/reports/
          app/build/outputs/logs/
